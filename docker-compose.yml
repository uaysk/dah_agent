services:
  dah-agent-poc:
    build: .
    container_name: dah-agent-poc
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/dah_poc.sqlite3
      TEMPORAL_ENABLED: ${TEMPORAL_ENABLED:-false}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-dah-agent-task-queue}
      REDIS_STREAMS_ENABLED: ${REDIS_STREAMS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://172.30.1.51:6379/0}
    ports:
      - "18080:8080"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: dah-agent-grafana
    depends_on:
      dah-agent-poc:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_DEFAULT_THEME: dark
    ports:
      - "13000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: dah-agent-dashboard
    depends_on:
      dah-agent-poc:
        condition: service_healthy
    ports:
      - "18081:80"
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:latest
    container_name: dah-agent-temporal
    profiles: ["temporal"]
    environment:
      DB: postgres12
      DB_PORT: ${TEMPORAL_DB_PORT:-5432}
      POSTGRES_SEEDS: ${TEMPORAL_DB_HOST:-172.30.1.49}
      POSTGRES_USER: ${TEMPORAL_DB_USER:-temporal}
      POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD:-}
      DBNAME: ${TEMPORAL_DB_NAME:-temporal}
      VISIBILITY_DBNAME: ${TEMPORAL_VISIBILITY_DB_NAME:-temporal_visibility}
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "17233:7233"
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    mem_limit: 768m
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    container_name: dah-agent-temporal-ui
    profiles: ["temporal"]
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_DEFAULT_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_UI_PORT: 8080
    ports:
      - "18233:8080"
    mem_limit: 256m
    restart: unless-stopped

  temporal-worker:
    build: .
    container_name: dah-agent-temporal-worker
    profiles: ["temporal"]
    env_file:
      - .env
    depends_on:
      - temporal
    environment:
      DATABASE_PATH: /app/data/dah_poc.sqlite3
      TEMPORAL_ENABLED: "true"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-dah-agent-task-queue}
      REDIS_STREAMS_ENABLED: ${REDIS_STREAMS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://172.30.1.51:6379/0}
    command: ["python", "-m", "app.temporal_worker"]
    volumes:
      - ./data:/app/data
    mem_limit: 256m
    restart: unless-stopped
